version: 2.0

jobs:
  build:
    docker:
      - image: zondax/builder-qemuv7
    steps:
      - checkout
      - run:
          command: . $HOME/.cargo/env && make
          environment:
            COMPILER_PREFIX: /home/zondax/optee/toolchains/aarch32/bin/arm-linux-gnueabihf-
            OS_ROOT: /home/zondax/optee/optee_os/out/arm/export-ta_arm32
            TEEC_ROOT: /home/zondax/optee/out-br/host/arm-buildroot-linux-gnueabihf/sysroot/usr
          name: Build
  build_armv8:
    docker:
      - image: zondax/builder-qemuv8
    steps:
      - checkout
      - run:
          command: . $HOME/.cargo/env && make
          environment:
            COMPILER_PREFIX: /home/zondax/optee/toolchains/aarch64/bin/arm-linux-gnueabihf-
            OS_ROOT: /home/zondax/optee/optee_os/out/arm/export-ta_arm64
            TEEC_ROOT: /home/zondax/optee/out-br/host/aarch64-buildroot-linux-gnu/sysroot/usr
          name: Build

workflows:
  version: 2
  build_all:
    jobs:
      - build
      - build_armv8